name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      DERIVED_DATA_PATH: .xcode-derived-data-release
      SOURCE_PACKAGES_DIR: .xcode-source-packages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Resolve package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Lingobar.xcodeproj \
            -scheme Lingobar \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR"

      - name: Derive version metadata
        id: version
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          VERSION="${TAG_NAME#v}"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: |
          swift test --package-path Packages/LingobarKit

          xcodebuild test \
            -project Lingobar.xcodeproj \
            -scheme Lingobar \
            -destination 'platform=macOS' \
            -only-testing:LingobarUITests \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            -derivedDataPath .xcode-derived-data-ci

      - name: Build unsigned DMG
        id: dmg
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUTPUT_DIR="$RUNNER_TEMP/release"
          DMG_NAME="Lingobar-v${VERSION}-unsigned.dmg"
          ./scripts/build-release-dmg.sh "$VERSION" "$OUTPUT_DIR" "$GITHUB_RUN_NUMBER" >/dev/null
          echo "dmg_path=${OUTPUT_DIR}/${DMG_NAME}" >> "$GITHUB_OUTPUT"
          echo "dmg_name=${DMG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          generate_release_notes: true
          files: ${{ steps.dmg.outputs.dmg_path }}
